<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ডিজিটাল তাসবিহ - রিয়াদুল ইসলাম</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #006400;
            --bg-color: #e8f5e9;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --accent-color: #d4af37;
        }

        .dark-mode {
            --primary-color: #2ecc71;
            --bg-color: #1a1a1a;
            --card-bg: #2c2c2c;
            --text-color: #ecf0f1;
        }

        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 20px;
            transition: 0.3s;
            display: flex; flex-direction: column; align-items: center;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { margin-bottom: 5px; font-size: 24px; }
        .dev-name { font-size: 13px; margin: 0; opacity: 0.8; }

        .top-controls { display: flex; gap: 10px; margin-bottom: 20px; }

        .container { width: 100%; max-width: 500px; }

        .card {
            background: var(--card-bg);
            border-radius: 15px; padding: 20px;
            margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-top: 5px solid var(--primary-color);
            position: relative;
        }

        .arabic { font-size: 24px; text-align: right; color: var(--primary-color); font-weight: bold; margin-bottom: 8px; }
        .pronunciation { font-size: 16px; font-weight: bold; color: var(--text-color); margin-bottom: 4px; }
        .meaning { font-size: 14px; color: #666; font-style: italic; margin-bottom: 15px; line-height: 1.4; }

        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 10px; background: rgba(0,0,0,0.05);
            padding: 10px; border-radius: 10px; margin: 15px 0;
            text-align: center;
        }

        .stat-box span { display: block; font-size: 11px; }
        .stat-box strong { font-size: 18px; color: var(--primary-color); }

        .tap-area { display: flex; flex-direction: column; align-items: center; margin-bottom: 15px; }

        .main-tap-btn {
            width: 85px; height: 85px;
            background: var(--primary-color);
            color: white; border: 4px solid var(--accent-color);
            border-radius: 50%; font-size: 30px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }
        .main-tap-btn:active { transform: scale(0.9); }

        .tap-text { font-size: 12px; color: var(--text-color); margin-top: 5px; font-weight: bold; opacity: 0.7; }

        .input-group { display: flex; gap: 5px; margin-bottom: 8px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #ccc; background: var(--card-bg); color: var(--text-color); }
        
        button { border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-action { background: var(--primary-color); color: white; padding: 10px 15px; }
        .btn-gold { background: var(--accent-color); color: white; padding: 10px 15px; }
        .btn-share { background: #3498db; color: white; padding: 8px 15px; font-size: 13px; }
        .btn-mode { background: #34495e; color: white; padding: 8px 15px; font-size: 13px; }

        .btn-reset-large {
            width: 100%; padding: 12px;
            background-color: #e74c3c; color: white;
            margin-top: 15px; font-size: 14px;
        }

        .celebration { color: #27ae60; font-weight: bold; display: none; text-align: center; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="top-controls">
        <button class="btn-mode" onclick="toggleDarkMode()">🌓 ডার্ক মোড</button>
        <button class="btn-share" onclick="shareApp()">🔗 শেয়ার করুন</button>
    </div>

    <div class="header">
        <h1>ডিজিটাল তাসবিহ কাউন্টার</h1>
        <p class="dev-name">Developed By: <span style="color: var(--primary-color); font-weight: bold;">রিয়াদুল ইসলাম</span></p>
    </div>

    <div id="app" class="container"></div>

    <script>
        const tasbeehs = [
            { 
                id: 'kalima', 
                ar: 'لَا إِلٰهَ إِلَّا اللهُ مُحَمَّدٌ رَسُولُ اللهِ', 
                bn: 'লা-ইলাহা ইল্লাল্লাহু মুহাম্মাদুর রাসুলুল্লাহ',
                mean: 'আল্লাহ ছাড়া কোনো উপাস্য নেই, মুহাম্মদ (সা.) আল্লাহর প্রেরিত রাসুল।'
            },
            { 
                id: 'subhan', 
                ar: 'سُبْحَانَ ٱللَّٰهِ', 
                bn: 'সুবহানাল্লাহ',
                mean: 'আল্লাহ অতি পবিত্র।'
            },
            { 
                id: 'alhamd', 
                ar: 'ٱلْحَمْدُ لِلَّٰهِ', 
                bn: 'আলহামদুলিল্লাহ',
                mean: 'সমস্ত প্রশংসা আল্লাহর জন্য।'
            },
            { 
                id: 'allahuakbar', 
                ar: 'ٱللَّٰهُ أَكْبَرُ', 
                bn: 'আল্লাহু আকবার',
                mean: 'আল্লাহ সবচেয়ে মহান।'
            },
            { 
                id: 'istigfar', 
                ar: 'أَسْتَغْفِرُ ٱللَّٰهَ', 
                bn: 'আস্তাগফিরুল্লাহ',
                mean: 'আমি আল্লাহর কাছে ক্ষমা চাই।'
            }
        ];

        function initApp() {
            const container = document.getElementById('app');
            tasbeehs.forEach(item => {
                const total = localStorage.getItem(`${item.id}_total`) || 0;
                const target = localStorage.getItem(`${item.id}_target`) || 0;
                const rem = Math.max(0, target - total);

                container.innerHTML += `
                    <div class="card">
                        <div class="arabic">${item.ar}</div>
                        <div class="pronunciation">${item.bn}</div>
                        <div class="meaning">অর্থ: ${item.mean}</div>
                        
                        <div class="stats-grid">
                            <div class="stat-box"><span>পড়া হয়েছে</span><strong id="total-${item.id}">${total}</strong></div>
                            <div class="stat-box"><span>বাকি আছে</span><strong id="rem-${item.id}">${rem}</strong></div>
                            <div class="stat-box"><span>টার্গেট</span><strong id="tar-${item.id}">${target}</strong></div>
                        </div>

                        <div class="tap-area">
                            <div class="main-tap-btn" onclick="tapOne('${item.id}')">☝️</div>
                            <div class="tap-text">চাপুন</div>
                        </div>

                        <div id="msg-${item.id}" class="celebration">মাশাআল্লাহ! টার্গেট পূর্ণ হয়েছে।</div>

                        <div class="input-group">
                            <input type="number" id="in-add-${item.id}" placeholder="কতবার পড়লেন?">
                            <button class="btn-action" onclick="addBulk('${item.id}')">পড়েছি</button>
                        </div>
                        <div class="input-group">
                            <input type="number" id="in-tar-${item.id}" placeholder="টার্গেট সেট করুন">
                            <button class="btn-gold" onclick="setTarget('${item.id}')">টার্গেট</button>
                        </div>
                        <button class="btn-reset-large" onclick="reset('${item.id}')">হিসাব রিসেট করুন</button>
                    </div>
                `;
            });
            checkAllTargets();
        }

        window.tapOne = function(id) {
            if (navigator.vibrate) navigator.vibrate(50);
            let total = parseInt(localStorage.getItem(`${id}_total`) || 0);
            total++;
            updateUI(id, total);
        }

        window.addBulk = function(id) {
            const input = document.getElementById(`in-add-${id}`);
            const val = parseInt(input.value);
            if (!val || val <= 0) return;
            let total = parseInt(localStorage.getItem(`${id}_total`) || 0);
            total += val;
            updateUI(id, total);
            input.value = '';
        }

        window.setTarget = function(id) {
            const val = parseInt(document.getElementById(`in-tar-${id}`).value);
            localStorage.setItem(`${id}_target`, val || 0);
            location.reload();
        }

        function updateUI(id, total) {
            localStorage.setItem(`${id}_total`, total);
            document.getElementById(`total-${id}`).innerText = total;
            const target = parseInt(localStorage.getItem(`${id}_target`) || 0);
            document.getElementById(`rem-${id}`).innerText = Math.max(0, target - total);
            if (target > 0 && total >= target) document.getElementById(`msg-${id}`).style.display = 'block';
        }

        function checkAllTargets() {
            tasbeehs.forEach(item => {
                const total = parseInt(localStorage.getItem(`${item.id}_total`) || 0);
                const target = parseInt(localStorage.getItem(`${item.id}_target`) || 0);
                if (target > 0 && total >= target) document.getElementById(`msg-${item.id}`).style.display = 'block';
            });
        }

        window.toggleDarkMode = function() {
            document.body.classList.toggle('dark-mode');
        }

        window.shareApp = function() {
            if (navigator.share) {
                navigator.share({ title: 'ডিজিটাল তাসবিহ', text: 'রিয়াদুল ইসলামের তৈরি ডিজিটাল তাসবিহ অ্যাপ।', url: window.location.href });
            } else {
                alert("লিঙ্কটি কপি করে শেয়ার করুন।");
            }
        }

        window.reset = function(id) {
            if(confirm('আপনি কি এই তাসবিহ এর মোট হিসাব রিসেট করতে চান?')) { 
                localStorage.setItem(`${id}_total`, 0); 
                location.reload(); 
            }
        }

        initApp();
    </script>
</body>
</html>
